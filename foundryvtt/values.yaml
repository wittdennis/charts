config:
  # -- Number of times the container will try to download the foundry binary
  downloadRetries: 3
  # -- Defines if telemetry data are allowed to be tracked
  enableTelemetry: false
  # -- Defines if static files should be minified
  minifyStaticFiles: true
  # -- Defines if in-app configuration changes should be preserved across container restarts
  preserveConfig: false
  # -- The default world to load when the server has started
  defaultWorld: ~
  # -- Set to true to automatically delete legacy NeDB .db files after they have been migrated to the LevelDB format introduced in Version 11. Enabling this recovers disk space but removes the ability to roll back to a pre-migration state. Only relevant for data volumes previously used with Foundry Version 10 or earlier.
  deleteNeDbFiles: false
  # -- The maximum size a log file can reach before it is rotated. Units must be included. e.g.; 1024k, 64m, 1g.
  logFileSize: 64M
  # -- The maximum number of log files to retain before older ones are deleted.
  maxNumberOfLogFiles: 10
  # -- Set to true to disable the automatic backup of world data that Foundry creates before performing major version migrations. Users with an external backup strategy or constrained storage may wish to enable this.
  disableBackups: false
  # -- Choose the CSS theme for the setup page. Valid values are dark, fantasy, and scifi.
  cssTheme: dark
  # -- Can be used to specify a specific foundry license key
  licenseKeySecret:
    # -- Name of the secret containing the license key
    name: ~
    # -- Key containing the license key
    key: license-key
  # -- Secret containing username and password foundryvtt.com needed to download the foundry binaries
  foundryAuthSecret:
    # -- Name of the secret containing the login data
    name: ~
    # -- Key containing the username
    usernameKey: username
    # -- Key containing the password
    passwordKey: password
  # -- Secret containing the admin password for the instance
  adminKeySecret:
    # -- Name of the secret
    name: ~
    # -- Key containing the admin password
    key: admin-key
  # -- Secret containing awsConfig.json
  awsConfigSecret:
    # -- Name of the secret
    name: ~
    # -- Key containing the aws config
    key: awsConfig.json

# -- This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  # -- Registry of the image
  registry: ghcr.io
  # -- Repository of the image
  repository: felddy/foundryvtt
  # -- This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ~

# -- This is for the secretes for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# -- This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# -- This configures the storage for the data drive
storage:
  # -- The size the pv should have
  size: 10Gi
  # -- The storage class name to use
  className: ~

# -- This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Automatically mount a ServiceAccount's API credentials?
  automount: false
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ~

# -- This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# -- This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  seccompProfile:
    type: RuntimeDefault
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true

# -- This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # -- This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # -- This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80

# -- This block is for setting up gateway api http route. More information can be found here: https://gateway-api.sigs.k8s.io/
route:
  # -- Flag to control if route should be created
  enabled: false
  # -- Additional labels for the HTTPRoute
  labels: {}
  # -- Additional annotations for the HTTPRoute
  annotations: {}
  # -- Hostnames of the HTTPRoute
  hostnames: []
  # - foundryvtt.example.com

  # -- Gateway reference that the HTTPRoute should bind against
  parentRefs: []
  # - group: gateway.networking.k8s.io
  #   kind: Gateway
  #   name: example-gateway
  #   namespace: gateway-namespace

  # -- Matches for the default rule
  matches:
    - path:
        type: PathPrefix
        value: /

  # -- Filter that should be added to the default rule
  filters: []

  # -- Any custom rule you want to specify
  additionalRules: []

# -- This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  # - secretName: chart-example-tls
  #   hosts:
  #     - chart-example.local

# --  Resources for the foundry container
resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# --  This is to setup the liveness probe more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  initialDelaySeconds: 600
  failureThreshold: 10
  periodSeconds: 300
  httpGet:
    path: /
    port: http
# --  This is to setup the readiness probe more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
readinessProbe:
  initialDelaySeconds: 30
  httpGet:
    path: /
    port: http

nodeSelector: {}

tolerations: []

affinity: {}
