# -- This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  # -- Container registry where the repository is hosted
  registry: ghcr.io
  # -- Container repository
  repository: matter-js/matterjs-server
  # -- This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ""

# -- Init container to remove matter.lock files which can be left behind if the matter-server doesn't shut down cleanly
lockFileRemover:
  # -- Flag to disable the init container
  enabled: true
  # -- Sets the image for the initContainer
  image:
    # -- Container registry where the repository is hosted
    registry: docker.io
    # -- Container repository
    repository: library/busybox
    # -- Image tag
    tag: 1.37.0 # renovate: datasource=docker depName=docker.io/library/busybox versioning=docker

# -- Bluetooth settings
bluetoothCommissioning:
  # -- Flag to control if bluetooth commissioning should be enabled
  enabled: false
  # -- Id of the bluetooth adapter e.g.: 0 for hci0
  adapterId: 0

# -- Indicates whether information about services should be injected into pod's environment variables, matching the syntax of Docker links
enableServiceLinks: true

# -- Name of the network interface that should be used
networkInterface: ~

log:
  # -- Global logging level, possible options are: critical, error, warning, info, debug, verbose
  logLevel: info

# -- This is for the secretes for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# -- This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# -- This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Automatically mount a ServiceAccount's API credentials?
  automount: false
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# -- This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# -- This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

# -- This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # -- This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # -- This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80

# -- This block is for setting up gateway api http route. More information can be found here: https://gateway-api.sigs.k8s.io/
route:
  # -- Flag to control if route should be created
  enabled: false
  # -- Additional labels for the HTTPRoute
  labels: {}
  # -- Additional annotations for the HTTPRoute
  annotations: {}
  # -- Hostnames of the HTTPRoute
  hostnames: []
  # - ha-matter.example.com

  # -- Gateway reference that the HTTPRoute should bind against
  parentRefs: []
  # - group: gateway.networking.k8s.io
  #   kind: Gateway
  #   name: example-gateway
  #   namespace: gateway-namespace

  # -- Matches for the default rule
  matches:
    - path:
        type: PathPrefix
        value: /

  # -- Filter that should be added to the default rule
  filters: []

  # -- Any custom rule you want to specify
  additionalRules: {}

# -- This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

  # -- Settings for storage
persistence:
  # -- Storage class to use for persistent storage. If left empty default storage class will be used.
  storageClassName: ~
  # -- Size for the persistent volume claim.
  size: 2Gi

# -- This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http
# -- Used to define a startup probe. More information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/#define-startup-probes
startupProbe: {}

# -- Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# -- Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

# -- Selector to control on which node the pods should be running
nodeSelector: {}

tolerations: []

affinity: {}
