{{- if .Values.route.rest.enabled -}}
{{- $fullName := "(include 'home-assistant-otbr.fullname' .)-rest" -}}
{{- $svcPort := .Values.service.rest.port -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "home-assistant-otbr.labels" . | nindent 4 }}
    {{- with .Values.route.rest.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.route.rest.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.route.rest.hostnames }}
  hostnames:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
  {{- with .Values.route.rest.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- if .Values.route.rest.additionalRules }}
    {{- tpl (toYaml .Values.route.rest.additionalRules) $ | nindent 4 }}
    {{- end }}
    - backendRefs:
        - name: {{ $fullName }}
          port: {{ $svcPort }}
          weight: 100
      {{- with .Values.route.rest.matches }}
      matches:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.route.rest.filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end -}}
{{- end }}
