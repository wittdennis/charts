# Default values for paperless-ngx.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Configuration for redis connection
redis:
  # -- The url to be used to make the redis connection
  connectionUrl: ~
  # -- Can be used as an alternative to `connectionUrl`. Takes precedence.
  connectionSecret:
    # -- Name of the secret containing the connection url
    name: ~
    # -- Key of the connection url
    key: ~
  # -- Prefix to be used in Redis for keys and channels. Useful for sharing one Redis server among multiple Paperless instances.
  prefix: ~

# -- Database configuration
database:
  # -- Engine to use for the database (possible values sqlite (default), postgresql, mariadb)
  engine: sqlite
  # -- When `engine` isn't sqlite set host for your database
  host: ~
  # -- When `engine` isn't sqlite use this to set the db user for the connection
  user: ~
  # -- When `engine` isn't sqlite use this to specify a secret containing the user for the connection
  userSecret:
    # -- Name of the secret
    name: ~
    # -- Key of the user
    key: ~
  # -- When `engine` isn't sqlite use this to set the db user password for the connection
  password: ~
  # -- When `engine` isn't sqlite use this to specify a secret containing the user password for the connection
  passwordSecret:
    # -- Name of the secret
    name: ~
    # -- Key of the password
    key: ~
  # -- When `engine` isn't sqlite can be used to set the port of the db. Defaults to 5432 for postgres and 3306 for mariadb
  port: ~
  # -- Can be used to configure a custom name for the database defaults to paperless
  databaseName: ~
  # -- Caches the database read query results into Redis. This can significantly improve application response times by caching database queries, at the cost of slightly increased memory usage.
  enableReadCache: false
  # -- Specifies how long (in seconds) read data should be cached. Allowed values are between 1 (one second) and 31536000 (one year).
  readCacheTTL: 3600

# -- This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# -- This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  registry: ghcr.io
  repository: paperless-ngx/paperless-ngx
  # -- This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # -- Overrides the image tag whose default is the chart appVersion.
  tag: ""

# -- This is for the secretes for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# -- This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

# -- This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Automatically mount a ServiceAccount's API credentials?
  automount: false
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# -- This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# -- This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

# -- Configuration for data persistence
persistence:
  # -- Setting for auxiliary data like sqlite database
  data:
    # -- When set to false emptyDir will be created which will lead to data loss on pod restart
    enabled: true
    # -- Set the name of a existing persistent volume claim in order to not create a new one
    existingVolumeClaim: ~
    # -- Use this to specify the storage class that should be used for pvc creation
    storageClass: ~
    # -- Set the access mode for the created pvc
    accessMode: ReadWriteOnce
    # -- Size of the persistent volume
    size: 10Gi
  # -- Setting for the media directory. This is where the documents are stored
  media:
    # -- When set to false emptyDir will be created which will lead to data loss on pod restart
    enabled: true
    # -- Set the name of a existing persistent volume claim in order to not create a new one
    existingVolumeClaim: ~
    # -- Use this to specify the storage class that should be used for pvc creation
    storageClass: ~
    # -- Set the access mode for the created pvc
    accessMode: ReadWriteOnce
    # -- Size of the persistent volume
    size: 100Gi
  # -- Setting for the consume directory. Paperless will process documents saved to this
  consume:
    # -- When set to false emptyDir will be created which will lead to data loss on pod restart
    enabled: false
    # -- Set the name of a existing persistent volume claim in order to not create a new one
    existingVolumeClaim: ~
    # -- Use this to specify the storage class that should be used for pvc creation
    storageClass: ~
    # -- Set the access mode for the created pvc
    accessMode: ReadWriteOnce
    # -- Size of the persistent volume
    size: 10Gi
  # -- Setting for the export directory. This will be used for data exports.
  export:
    # -- When set to false emptyDir will be created which will lead to data loss on pod restart
    enabled: false
    # -- Set the name of a existing persistent volume claim in order to not create a new one
    existingVolumeClaim: ~
    # -- Use this to specify the storage class that should be used for pvc creation
    storageClass: ~
    # -- Set the access mode for the created pvc
    accessMode: ReadWriteOnce
    # -- Size of the persistent volume
    size: 10Gi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  fsGroupChangePolicy: OnRootMismatch
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  seccompProfile:
    type: RuntimeDefault
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  privileged: false
  capabilities:
    drop:
      - ALL

# -- This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # -- This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # -- This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 80

# -- This block is for setting up gateway api http route. More information can be found here: https://gateway-api.sigs.k8s.io/
route:
  # -- Flag to control if route should be created
  enabled: false
  # -- Additional labels for the HTTPRoute
  labels: {}
  # -- Additional annotations for the HTTPRoute
  annotations: {}
  # -- Hostnames of the HTTPRoute
  hostnames: []
  # - paperless-ngx.example.com

  # -- Gateway reference that the HTTPRoute should bind against
  parentRefs: []
  # - group: gateway.networking.k8s.io
  #   kind: Gateway
  #   name: example-gateway
  #   namespace: gateway-namespace

  # -- Matches for the default rule
  matches:
    - path:
        type: PathPrefix
        value: /

  # -- Filter that should be added to the default rule
  filters: []

  # -- Any custom rule you want to specify
  additionalRules: {}

# -- This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# -- This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  initialDelaySeconds: 30
  failureThreshold: 10
  periodSeconds: 100
  httpGet:
    path: /
    port: http
readinessProbe:
  initialDelaySeconds: 30
  httpGet:
    path: /
    port: http

# -- This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# -- Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# -- Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}
